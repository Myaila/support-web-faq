<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="Central de Ajuda — Perguntas Frequentes" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <style>
      :root {
        --theme-color: #1976d2;
      }
    </style>
  </head>
  <body>
    <div id="app">Carregando...</div>
    <script>
      window.$docsify = {
        name: "FAQ",
        repo: "", // Substitua pela URL do repositório, ex: "https://github.com/usuario/web-faq"
        loadSidebar: true,
        subMaxLevel: 2,
        auto2top: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "Buscar...",
          noData: "Nenhum resultado encontrado.",
          depth: 6,
          hideOtherSidebarContent: false,
        },
        plugins: [],
      };
    </script>
    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <!-- Search plugin -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  </body>
</html>
